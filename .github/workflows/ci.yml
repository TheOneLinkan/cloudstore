name: CloudStore CI/CD

on:
  push:
    branches:
      - main
      - feature/**

jobs:

  # =========================
  # TEST + BUILD STAGE
  # =========================
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # --- USER-ORDER-SERVICE ---
      - name: Test user-order-service
        run: mvn -f user-order-service/pom.xml clean test

      - name: Build user-order-service
        run: mvn -f user-order-service/pom.xml clean package -DskipTests

      # --- PRODUCT-SERVICE ---
      - name: Test product-service
        run: mvn -f product-service/pom.xml clean test

      - name: Build product-service
        run: mvn -f product-service/pom.xml clean package -DskipTests


  # =========================
  # DOCKER BUILD + PUSH
  # =========================
  docker:

    runs-on: ubuntu-latest
    needs: build-and-test

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # USER-ORDER-SERVICE IMAGE
      # -------------------------
      - name: Build user-order-service image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudstore-user-order-service:latest ./user-order-service

      # -------------------------
      # PRODUCT-SERVICE IMAGE
      # -------------------------
      - name: Build product-service image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudstore-product-service:latest ./product-service

      # -------------------------
      # PUSH ALL IMAGES
      # -------------------------
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudstore-user-order-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudstore-product-service:latest