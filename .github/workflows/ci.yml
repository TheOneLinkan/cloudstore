name: CloudStore CI

on:
  push:
    branches:
      - main
      - feature/**

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build and package
        run: |
          cd user-order-service
          mvn clean package

  docker:

    runs-on: ubuntu-latest

    needs: build-and-test

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build JAR
        run: |
          cd user-order-service
          mvn clean package -DskipTests

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudstore-user-order-service:latest ./user-order-service

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudstore-user-order-service:latest