version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: cloudstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cloudstore
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cloudstore-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8080"
    networks:
      - cloudstore-net

  user-order-service:
    build: ./user-order-service
    container_name: user-order-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cloudstore
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - mysql
      - product-service
    networks:
      - cloudstore-net

volumes:
  mysql_data:

networks:
  cloudstore-net: