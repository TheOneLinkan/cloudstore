services:

  mysql:
    image: mysql:8.0
    container_name: cloudstore-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cloudstore

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10


  user-order-service:
    container_name: user-order-service
    build:
      context: ./user-order-service

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cloudstore
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root


  product-service:
    container_name: product-service
    build:
      context: ./product-service

    ports:
      - "8081:8080"

    environment:
      SERVER_PORT: 8080


volumes:
  mysql-data: